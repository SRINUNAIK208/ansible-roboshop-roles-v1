  - name: install mysql 
    ansible.builtin.dnf:
      name: mysql-server 
      state: present 

  - name: enable and start mysql server
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes 
      
  - name: set mysql password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1